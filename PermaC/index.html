<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>PermaC Land &amp; Environment Inc.</title>
	<link rel="icon" href="../images/iconlogo.ico" type="image/x-icon" />
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet" />
	<style>
		:root {
			--bg: #f4f2ee;
			--fg: #2c2a26;
			--muted: #6b6560;
			--line: rgba(44, 42, 38, 0.08);
		}
		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}
		html {
			font-size: 18px;
			-webkit-font-smoothing: antialiased;
		}
		body {
			font-family: "DM Sans", system-ui, sans-serif;
			font-weight: 400;
			color: var(--fg);
			background: var(--bg);
			min-height: 100vh;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			padding: 2rem 1.5rem 3rem;
			line-height: 1.55;
		}
		main {
			width: 100%;
			max-width: 36rem;
			text-align: center;
		}
		.brand {
			margin-bottom: 2.25rem;
		}
		.brand img {
			width: min(100%, 320px);
			height: auto;
			display: block;
			margin: 0 auto;
		}
		h1 {
			font-size: 0.75rem;
			font-weight: 500;
			letter-spacing: 0.22em;
			text-transform: uppercase;
			color: var(--muted);
			margin-bottom: 0.75rem;
		}
		.tagline {
			font-size: 1.05rem;
			font-weight: 300;
			color: var(--fg);
			max-width: 28ch;
			margin: 0 auto 2.5rem;
		}
		hr {
			border: none;
			height: 1px;
			background: var(--line);
			margin: 2rem 0;
		}
		footer {
			font-size: 0.85rem;
			color: var(--muted);
		}
		footer a {
			color: var(--fg);
			text-decoration: none;
			border-bottom: 1px solid transparent;
			transition: border-color 0.2s ease;
		}
		footer a:hover {
			border-bottom-color: var(--fg);
		}
	</style>
</head>
<body>
	<main>
		<p class="brand">
			<img src="../images/PermaC_Logo.png" alt="PermaC Land &amp; Environment Inc." width="640" height="auto" />
		</p>
		<h1>Land &amp; Environment</h1>
		<p class="tagline">Practical approaches to land and environmental challenges.</p>
		<hr />
		<footer>
			<a href="../">← Cansu Culha</a>
		</footer>
	</main>
</body>
</html>
